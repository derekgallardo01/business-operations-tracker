services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DevPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "DevPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/scripts
    entrypoint: >
      bash -c "
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -Q 'CREATE DATABASE [operations-tracker]' &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -d 'operations-tracker' -i /scripts/001-create-tables.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -d 'operations-tracker' -i /scripts/002-create-indexes.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -d 'operations-tracker' -i /scripts/003-create-views.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -d 'operations-tracker' -i /scripts/004-seed-data.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'DevPassword123!' -C -d 'operations-tracker' -i /scripts/005-stored-procedures.sql &&
        echo 'Database initialized successfully'
      "

  api:
    build:
      context: ./api
    ports:
      - "5138:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=operations-tracker;User Id=sa;Password=DevPassword123!;Encrypt=False;TrustServerCertificate=True;"
      ASPNETCORE_URLS: "http://+:8080"

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
